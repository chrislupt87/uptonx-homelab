global:
  scrape_interval: 15s

scrape_configs:
  - job_name: traefik
    static_configs:
      - targets: ["192.168.1.15:8080"]

  - job_name: node-exporter
    static_configs:
      - targets:
          - "192.168.1.77:9100"
          - "192.168.1.18:9100"
          - "192.168.1.80:9100"
          - "192.168.1.74:9100"
          - "192.168.1.69:9100"
        labels:
          group: proxmox
