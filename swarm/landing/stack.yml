version: "3.8"

services:
  web:
    image: nginx:alpine
    configs:
      - source: index
        target: /usr/share/nginx/html/index.html
    networks:
      - proxy
    ports:
      - "8092:80"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

configs:
  index:
    file: ./index.html

networks:
  proxy:
    external: true
