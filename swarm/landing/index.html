<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>uptonx.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e0e0e0;
      overflow: hidden;
    }
    .container {
      text-align: center;
      z-index: 1;
      position: relative;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 200;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #e94560 0%, #6c63ff 25%, #00d2ff 50%, #e94560 75%, #6c63ff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #e94560, #6c63ff, transparent);
      margin: 2rem auto;
    }
    .status {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
    }
    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #e94560;
      border-radius: 50%;
      margin-right: 10px;
      vertical-align: middle;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="container">
    <h1><span style="font-size:1.4em;font-weight:300">U</span>pton<span style="font-size:1.4em;font-weight:300">X</span></h1>
    <div class="divider"></div>
    <p class="status"><span class="dot"></span>Under construction</p>
  </div>
  <script>
    const c = document.getElementById('bg');
    const ctx = c.getContext('2d');
    let w, h, particles;

    function init() {
      w = c.width = window.innerWidth;
      h = c.height = window.innerHeight;
      const colors = ['233,69,96','108,99,255','0,210,255'];
      particles = Array.from({length: 80}, () => ({
        x: Math.random() * w,
        y: Math.random() * h,
        r: Math.random() * 1.5 + 0.5,
        dx: (Math.random() - 0.5) * 0.3,
        dy: (Math.random() - 0.5) * 0.3,
        o: Math.random() * 0.4 + 0.1,
        c: colors[Math.floor(Math.random() * colors.length)]
      }));
    }

    function draw() {
      ctx.clearRect(0, 0, w, h);
      for (const p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0) p.x = w;
        if (p.x > w) p.x = 0;
        if (p.y < 0) p.y = h;
        if (p.y > h) p.y = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${p.c},${p.o})`;
        ctx.fill();
      }
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d = dx * dx + dy * dy;
          if (d < 12000) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(${particles[i].c},${0.08 * (1 - d / 12000)})`;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }

    init();
    draw();
    window.addEventListener('resize', init);
  </script>
</body>
</html>
