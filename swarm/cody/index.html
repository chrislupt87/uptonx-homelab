<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cody.uptonx.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      color: #eee;
    }
    #gate {
      text-align: center;
    }
    #gate h2 {
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    #gate input {
      padding: 0.75rem 1.25rem;
      font-size: 1.1rem;
      border: 2px solid #333;
      border-radius: 8px;
      background: #16213e;
      color: #eee;
      outline: none;
      width: 250px;
    }
    #gate input:focus { border-color: #e94560; }
    #gate button {
      padding: 0.75rem 1.5rem;
      font-size: 1.1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      margin-left: 0.5rem;
    }
    #gate button:hover { background: #c23152; }
    #gate .error { color: #e94560; margin-top: 1rem; display: none; }
    #content { display: none; }
    h1 { font-size: 2rem; margin-bottom: 2rem; }
    .banner {
      background: linear-gradient(135deg, #e94560, #c23152);
      padding: 1rem 2.5rem;
      border-radius: 12px;
      font-size: 1.4rem;
      font-weight: bold;
      margin: 2rem 0;
      text-align: center;
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    svg { filter: drop-shadow(0 0 20px rgba(255, 180, 150, 0.2)); }
    p { color: #888; margin-top: 1.5rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="gate">
    <h2>Enter Password</h2>
    <form onsubmit="return checkPass()">
      <input type="password" id="pw" placeholder="Password" autofocus>
      <button type="submit">Go</button>
    </form>
    <p class="error" id="err">Wrong password</p>
  </div>

  <div id="content">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <h1>Codys Page By Chris</h1>

      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="340" height="340">
        <defs>
          <radialGradient id="skinL" cx="40%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#f5c4a8"/>
            <stop offset="60%" stop-color="#e8a682"/>
            <stop offset="100%" stop-color="#d4906e"/>
          </radialGradient>
          <radialGradient id="skinR" cx="60%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#f5c4a8"/>
            <stop offset="60%" stop-color="#e8a682"/>
            <stop offset="100%" stop-color="#d4906e"/>
          </radialGradient>
          <radialGradient id="shadow" cx="50%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#c47a58" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#c47a58" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- left cheek -->
        <path d="M200 80 Q120 80 80 180 Q50 270 100 340 Q140 390 200 360" fill="url(#skinL)"/>
        <!-- right cheek -->
        <path d="M200 80 Q280 80 320 180 Q350 270 300 340 Q260 390 200 360" fill="url(#skinR)"/>
        <!-- cleft -->
        <path d="M200 90 Q192 150 188 210 Q185 270 195 330 Q198 350 200 360" stroke="#b06840" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <!-- inner shadow left -->
        <path d="M200 120 Q193 170 190 230 Q188 280 196 340" stroke="#c47a58" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.25"/>
        <!-- inner shadow right -->
        <path d="M200 120 Q207 170 210 230 Q212 280 204 340" stroke="#c47a58" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.15"/>
        <!-- highlight left cheek -->
        <ellipse cx="140" cy="200" rx="45" ry="55" fill="#fdd5be" opacity="0.3"/>
        <!-- highlight right cheek -->
        <ellipse cx="260" cy="200" rx="45" ry="55" fill="#fdd5be" opacity="0.3"/>
        <!-- bottom crease -->
        <path d="M120 340 Q160 370 200 360 Q240 370 280 340" stroke="#c47a58" stroke-width="2" fill="none" opacity="0.4"/>
      </svg>

      <div class="banner">Thieving videos to be added soon!</div>
      <p>under construction</p>
    </div>
  </div>

  <script>
    var h = "chris=bestsex";
    function checkPass() {
      if (document.getElementById("pw").value === h) {
        document.getElementById("gate").style.display = "none";
        document.getElementById("content").style.display = "block";
        sessionStorage.setItem("a", "1");
      } else {
        document.getElementById("err").style.display = "block";
      }
      return false;
    }
    if (sessionStorage.getItem("a") === "1") {
      document.getElementById("gate").style.display = "none";
      document.getElementById("content").style.display = "block";
    }
  </script>
</body>
</html>
