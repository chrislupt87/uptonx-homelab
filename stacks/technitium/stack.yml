version: "3.8"

services:
  technitium:
    image: technitium/dns-server:latest
    ports:
      - target: 5380
        published: 5380
        mode: host
      - target: 53
        published: 53
        protocol: tcp
        mode: host
      - target: 53
        published: 53
        protocol: udp
        mode: host
    networks:
      - internal
    volumes:
      - /mnt/nas/stacks/technitium:/etc/dns
    environment:
      - DNS_SERVER_DOMAIN=homelab.local
      - DNS_SERVER_ADMIN_PASSWORD=admin
      # NOTE: Change DNS_SERVER_ADMIN_PASSWORD on first login via the web UI
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager

networks:
  internal:
    external: true
