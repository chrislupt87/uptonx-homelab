version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8080
        published: 8080
        mode: host
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/nas/stacks/traefik:/etc/traefik
      - /mnt/nas/stacks/traefik/certs:/certs
    secrets:
      - traefik_dashboard_auth
    command:
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Self-signed TLS — uses default cert from /certs
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Docker Swarm provider
      - "--providers.swarm=true"
      - "--providers.swarm.endpoint=unix:///var/run/docker.sock"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=proxy"
      # Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Logging
      - "--log.level=INFO"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager
      labels:
        # Dashboard router
        - "traefik.enable=true"
        - "traefik.http.routers.dashboard.rule=Host(`192.168.1.80`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
        - "traefik.http.routers.dashboard.entrypoints=websecure"
        - "traefik.http.routers.dashboard.service=api@internal"
        - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
        # Basic auth middleware — reads htpasswd from Docker secret
        - "traefik.http.middlewares.dashboard-auth.basicauth.usersfile=/run/secrets/traefik_dashboard_auth"
        # Dummy service port (required by Swarm provider)
        - "traefik.http.services.dashboard.loadbalancer.server.port=8080"

networks:
  proxy:
    external: true

secrets:
  traefik_dashboard_auth:
    external: true
