version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:latest
    ports:
      - target: 80
        published: 8880
        mode: host
    networks:
      - proxy
    volumes:
      - /mnt/nas/stacks/vaultwarden:/data
    secrets:
      - vaultwarden_admin_token
    environment:
      - ADMIN_TOKEN_FILE=/run/secrets/vaultwarden_admin_token
      - ROCKET_PORT=80
      - WEBSOCKET_ENABLED=true
      - SIGNUPS_ALLOWED=true
      # NOTE: Set SIGNUPS_ALLOWED=false after creating your accounts
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.labels.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.vaultwarden.rule=Host(`192.168.1.80`) && PathPrefix(`/vaultwarden`)"
        - "traefik.http.routers.vaultwarden.entrypoints=websecure"
        - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"

networks:
  proxy:
    external: true

secrets:
  vaultwarden_admin_token:
    external: true
