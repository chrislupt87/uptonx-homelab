http:
  routers:
    technitium:
      rule: "Host(`dns.uptonx.com`)"
      service: technitium
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    traefik-dashboard:
      rule: "Host(`traefik.uptonx.com`)"
      service: traefik-dashboard
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    email-rag:
      rule: "Host(`email-rag.uptonx.com`)"
      service: email-rag
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    chat:
      rule: "Host(`chat.uptonx.com`)"
      service: chat
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    audio:
      rule: "Host(`audio.uptonx.com`)"
      service: audio
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    frigate:
      rule: "Host(`frigate.uptonx.com`)"
      service: frigate
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    cody:
      rule: "Host(`cody.uptonx.com`)"
      service: cody
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    landing:
      rule: "Host(`uptonx.com`) || Host(`www.uptonx.com`)"
      service: landing
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    status:
      rule: "Host(`status.uptonx.com`)"
      service: status
      middlewares:
        - allow-iframe
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

    grafana:
      rule: "Host(`grafana.uptonx.com`)"
      service: grafana
      middlewares:
        - allow-iframe
      entryPoints:
        - websecure
      tls:
        certResolver: cloudflare

  middlewares:
    allow-iframe:
      headers:
        customResponseHeaders:
          X-Frame-Options: ""
          Content-Security-Policy: ""

  services:
    technitium:
      loadBalancer:
        servers:
          - url: "http://192.168.1.51:5380"

    traefik-dashboard:
      loadBalancer:
        servers:
          - url: "http://192.168.1.15:8080"

    email-rag:
      loadBalancer:
        servers:
          - url: "http://192.168.1.110:3000"

    chat:
      loadBalancer:
        servers:
          - url: "http://192.168.1.110:8080"

    audio:
      loadBalancer:
        servers:
          - url: "http://192.168.1.74:8090"

    frigate:
      loadBalancer:
        servers:
          - url: "http://192.168.1.18:5000"

    cody:
      loadBalancer:
        servers:
          - url: "http://192.168.1.23:8091"

    landing:
      loadBalancer:
        servers:
          - url: "http://192.168.1.23:8092"

    status:
      loadBalancer:
        servers:
          - url: "http://192.168.1.23:3001"

    grafana:
      loadBalancer:
        servers:
          - url: "http://192.168.1.23:3002"
