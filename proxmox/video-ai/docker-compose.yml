networks:
  video-ai:
    driver: bridge
services:
  compreface-postgres:
    image: postgres:11
    container_name: compreface-postgres
    restart: unless-stopped
    privileged: true
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_DB: compreface
    volumes:
    - /opt/video-ai/compreface/db:/var/lib/postgresql/data
    networks:
    - video-ai
  compreface:
    image: exadel/compreface:latest
    container_name: compreface
    restart: unless-stopped
    depends_on:
    - compreface-postgres
    ports:
    - 8000:80
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_URL: jdbc:postgresql://compreface-postgres:5432/compreface
      SPRING_PROFILES_ACTIVE: dev
      SAVE_IMAGES_TO_DB: 'true'
      MAX_FILE_SIZE: 5MB
      MAX_REQUEST_SIZE: 10MB
    networks:
    - video-ai
    privileged: true
  double-take:
    image: jakowenko/double-take:latest
    container_name: double-take
    restart: unless-stopped
    volumes:
    - /opt/video-ai/double-take:/.storage
    ports:
    - 3000:3000
    networks:
    - video-ai
    environment:
      TZ: America/Toronto
    privileged: true
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-video
    restart: unless-stopped
    privileged: true
    volumes:
    - /opt/video-ai/qdrant:/qdrant/storage
    ports:
    - 6333:6333
    - 6334:6334
    networks:
    - video-ai
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-video
    restart: unless-stopped
    volumes:
    - /opt/video-ai/n8n:/home/node/.n8n
    ports:
    - 5678:5678
    networks:
    - video-ai
    environment:
      TZ: America/Toronto
      N8N_HOST: n8n.uptonx.com
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://n8n.uptonx.com
    privileged: true
  clip-indexer:
    image: python:3.11-slim
    container_name: clip-indexer
    restart: unless-stopped
    volumes:
    - /opt/video-ai/clip:/app
    networks:
    - video-ai
    working_dir: /app
    command: "sh -c \"pip install -q fastapi uvicorn open-clip-torch pillow qdrant-client\
      \ requests &&\n       python clip_service.py\"\n"
    environment:
      QDRANT_HOST: qdrant-video
      QDRANT_PORT: '6333'
      FRIGATE_URL: http://192.168.1.18:5000
  llava-bridge:
    image: python:3.11-slim
    container_name: llava-bridge
    restart: unless-stopped
    volumes:
    - /opt/video-ai/llava:/app
    - /opt/video-ai/llava/data:/data
    networks:
    - video-ai
    working_dir: /app
    command: "sh -c \"pip install -q requests paho-mqtt &&\n       python llava_bridge.py\"\
      \n"
    environment:
      MQTT_HOST: 192.168.1.18
      FRIGATE_URL: http://192.168.1.18:5000
      OLLAMA_URL: http://192.168.1.110:11434
      LLAVA_MODEL: llava:13b
  face-trainer:
    image: python:3.11-slim
    container_name: face-trainer
    restart: unless-stopped
    volumes:
    - /opt/video-ai/face-trainer:/app
    - /opt/video-ai/face-trainer/data:/data
    networks:
    - video-ai
    working_dir: /app
    command: "sh -c \"pip install -q requests paho-mqtt pillow python-telegram-bot==13.15\
      \ &&\n       python face_trainer.py\"\n"
    environment:
      MQTT_HOST: 192.168.1.18
      FRIGATE_URL: http://192.168.1.18:5000
      COMPREFACE_URL: http://compreface:8000
      COMPREFACE_API_KEY: ${COMPREFACE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
