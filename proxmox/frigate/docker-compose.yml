services:
  frigate:
    container_name: frigate
    image: ghcr.io/blakeblackshear/frigate:stable
    restart: unless-stopped
    privileged: true
    network_mode: host
    shm_size: 256mb
    volumes:
      - /etc/frigate:/config
      - /media/frigate:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      FRIGATE_RTSP_PASSWORD: "changeme"
    mem_limit: 6g
    cpus: "6"
    depends_on:
      mosquitto:
        condition: service_started

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    restart: unless-stopped
    network_mode: host
    volumes:
      - /opt/frigate/mosquitto/config:/mosquitto/config
      - /opt/frigate/mosquitto/data:/mosquitto/data
      - /opt/frigate/mosquitto/log:/mosquitto/log
